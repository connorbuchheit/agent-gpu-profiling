# Agent GPU Profiling — default config
# Override via env or CLI when running benchmarks.

backend: vllm
base_url: "http://localhost:8000/v1"
# Qwen2.5-3B: 32k context (avoids TinyLlama 2k limit); or Qwen2.5-7B-Instruct for heavier
model: "Qwen/Qwen2.5-3B-Instruct"

# Task types to run (see PLANNING.md §3)
task_types:
  - short_loop
  - long_multiturn
  - tool_loop
  # - mixed

# Profiling
sampling_interval_sec: 1.0
output_dir: "./results"

# Short tool loop: number of agent steps (LLM calls)
short_loop_steps: 5

# Long multi-turn: number of long turns
long_multiturn_turns: 3

# Long reasoning: many heavier prompts (chain-of-thought style)
long_reasoning_turns: 25
