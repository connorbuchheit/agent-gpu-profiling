# Agent GPU Profiling — default config
# Override via env or CLI when running benchmarks.

backend: vllm
base_url: "http://localhost:8000/v1"
# Must match the model vLLM was started with. Check with: curl -s http://127.0.0.1:8000/v1/models
# Qwen2.5-3B: 32k context (restart vLLM with scripts/run_vllm.sh to load it)
# If you get 404, vLLM is still on TinyLlama — either restart vLLM with Qwen or use TinyLlama below.
model: "Qwen/Qwen2.5-3B-Instruct"
# model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"  # fallback if vLLM is still serving this

# Task types to run (see PLANNING.md §3)
task_types:
  - short_loop
  - long_multiturn
  - tool_loop
  # - mixed

# Profiling
sampling_interval_sec: 1.0
output_dir: "./results"

# Short tool loop: number of agent steps (LLM calls)
short_loop_steps: 5

# Long multi-turn: number of long turns
long_multiturn_turns: 3

# Long reasoning: many heavier prompts (chain-of-thought style)
long_reasoning_turns: 25

# shared_prefix: long fixed system doc + N short questions (RadixAttention / prefix cache stress)
shared_prefix_steps: 12

# Switch backend label + URL when using SGLang (see docs/SGLANG.md)
# backend: sglang
# base_url: "http://localhost:8000/v1"
