# Agent GPU Profiling — default config
# Override via env or CLI when running benchmarks.

backend: vllm
base_url: "http://localhost:8000/v1"
# Use TinyLlama (ungated); or meta-llama/Llama-3.2-1B with HF token
model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"

# Task types to run (see PLANNING.md §3)
task_types:
  - short_loop
  - long_multiturn
  - tool_loop
  # - mixed

# Profiling
sampling_interval_sec: 1.0
output_dir: "./results"

# Short tool loop: number of agent steps (LLM calls)
short_loop_steps: 5

# Long multi-turn: number of long turns
long_multiturn_turns: 3

# Long reasoning: heavier prompts (chain-of-thought style)
long_reasoning_turns: 3
